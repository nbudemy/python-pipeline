name: CI/CD for simple-http-checker

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  lint-format-type-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Display Python version and location
        run: |
          python --version
          which python
      - name: Install dev dependencies
        run: pip install ".[dev]"
      - name: Run Format checks with Black
        run: black --check . --target-version py312
      - name: Run linting checks with Ruff
        run: ruff check .
      - name: Type checks with MyPy
        run: mypy ./src
      - name: Security checks with Bandit
        run: bandit -c pyproject.toml -r .
  automated-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run PyTest
        run: pytest
  release:
    runs-on: ubuntu-latest
    needs:
      - lint-format-type-checks
      - automated-tests
    steps:
      - name: Release
        run: echo 'Release'